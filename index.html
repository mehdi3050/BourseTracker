
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>BourseTracker</title>
</head>
<body>

<h2>BourseTracker</h2>

<button onclick="test()">تست اتصال</button>

<pre id="out"></pre>

<script>
async function test() {
    const out = document.getElementById("out");

    try {
        const res = await fetch("https://tradersarena.ir/33887145736684266/history");
        const text = await res.text();
        out.textContent = text.substring(0,500);
    } catch (e) {
        out.textContent = e.toString();
    }
}
</script>

</body>
</html>
